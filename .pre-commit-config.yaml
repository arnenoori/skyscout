repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: check-json
    -   id: check-merge-conflict

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.3
    hooks:
    -   id: ruff
        args: [--fix]
    -   id: ruff-format

-   repo: local
    hooks:
    -   id: web-lint
        name: web lint
        entry: bash -c 'cd web_frontend && npm run lint'
        language: system
        pass_filenames: false
        files: ^web_frontend/
    -   id: web-typecheck
        name: web typecheck
        entry: bash -c 'cd web_frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: ^web_frontend/
